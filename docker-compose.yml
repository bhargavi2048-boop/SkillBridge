version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: skillbridge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillbridge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillbridge-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/skillbridge
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: change_this_in_production
      CLIENT_URL: http://localhost:3000
    env_file:
      - ./backend/.env

volumes:
  mongo_data:
